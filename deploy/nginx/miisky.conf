# Miisky — production Nginx site (Ubuntu/Debian layout)
#
# Note: `worker_processes auto;` belongs in /etc/nginx/nginx.conf (main context),
# not in this site file — do not paste it inside `server { }`.
#
# Install on the server (paths may vary):
#   sudo cp miisky.conf /etc/nginx/sites-available/miisky
#   sudo ln -sf /etc/nginx/sites-available/miisky /etc/nginx/sites-enabled/miisky
#   sudo rm -f /etc/nginx/sites-enabled/default   # optional: disable default site
#   sudo nginx -t && sudo systemctl reload nginx
#
# EDIT BEFORE USE:
#   - server_name (default below: public IP; add domains when you have DNS)
#   - root (folder with `npm run build` output — contents of frontend/dist)
#   - alias for /media/ (must match Django MEDIA_ROOT on this machine)
#   - STATIC_ROOT for collectstatic — use /var/www/miisky/static (see /static/ location)
#   - upstream port if Gunicorn is not on 127.0.0.1:8000
#
# Backend (same paths as backend/backend/urls.py):
#   /api/   → Django REST + app.urls
#   /admin/ → Django admin
#   /media/ → user uploads (served by Nginx from disk; required when DEBUG=False)

upstream miisky_django {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- HTTP (optionally redirect to HTTPS after certbot) ---
server {
    listen 80;
    listen [::]:80;
    server_name 18.190.152.118;

    # React build output (Vite): copy frontend/dist/* here
    root /var/www/miisky;
    index index.html;

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 256;

    # Uploaded media — set to the same path as Django MEDIA_ROOT
    location /media/ {
        alias /var/miisky/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Django API and admin (proxied to Gunicorn)
    location /api/ {
        proxy_pass http://miisky_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://miisky_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Django admin assets + any Vite `public/` files under /static/ — one folder on disk.
    # Typical deploy: copy dist/* to root below, then:
    #   STATIC_ROOT=/var/www/miisky/static  python manage.py collectstatic --noinput
    location /static/ {
        root /var/www/miisky;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Vite hashed chunks — safe to cache aggressively
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Second Vite entry (marketing site) — keep file reachable if you use it
    location = /website.html {
        try_files /website.html =404;
    }

    # SPA: main app (React Router). Avoid caching HTML shell so deploys show up quickly.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

