# Docker Compose for MySQL to PostgreSQL migration using pgloader
# Run: docker-compose -f docker-compose.migration.yml run --rm pgloader

version: '3.8'

services:
  pgloader:
    image: dimitri/pgloader:latest
    container_name: mysql-to-postgres-migration
    volumes:
      - .:/scripts
    working_dir: /scripts
    command: pgloader mysql://pgloader:migrate123@host.docker.internal:3306/db_food_with_data postgresql://postgres:1234@host.docker.internal:5432/db_food_with_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PGL_UNICODE=1
